<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JAVAS Gallery | Mobile Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .modal-bg { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px); }
        
        /* Smooth transitions for mobile */
        #lightbox-img { 
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out; 
        }
        
        /* Prevent pull-to-refresh when gallery is open */
        .overscroll-none { overscroll-behavior: none; }
    </style>
</head>

<body class="min-h-screen bg-slate-50 font-sans text-gray-800 relative selection:bg-orange-200">

    <div class="hidden sm:block fixed top-[-5%] left-[-5%] w-[30rem] h-[30rem] bg-orange-200/40 rounded-full mix-blend-multiply filter blur-[100px] z-0"></div>
    <div class="hidden sm:block fixed bottom-[-5%] right-[-5%] w-[35rem] h-[35rem] bg-rose-200/40 rounded-full mix-blend-multiply filter blur-[100px] z-0"></div>

    <div class="relative z-10 flex flex-col min-h-screen">
        
        <header class="p-4 sm:p-10 max-w-7xl mx-auto w-full">
            <a href="index.html" class="flex items-center gap-2 text-orange-600 font-bold hover:text-rose-600 transition-colors mb-4">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                <span class="text-sm uppercase tracking-wider">Home</span>
            </a>
            <h1 class="text-2xl sm:text-5xl font-extrabold text-gray-900 tracking-tight">
                Event <span class="bg-clip-text text-transparent bg-gradient-to-r from-orange-600 to-rose-600">Gallery</span>
            </h1>
        </header>

        <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 pb-20">
            <div id="dynamic-gallery-wrapper" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-6">
            </div>
        </main>

        <footer class="bg-white/40 backdrop-blur-md py-6 text-center text-xs text-gray-500 border-t border-white/20">
            <p>© 2026 JAVAS Karimnagar.</p>
        </footer>
    </div>

    <div id="lightbox" class="fixed inset-0 z-[100] hidden flex flex-col modal-bg overscroll-none">
        <div class="w-full flex justify-between items-center p-4 z-[110]">
            <span id="img-counter" class="text-white/70 font-mono text-sm sm:text-lg">01 / 08</span>
            <button onclick="closeLightbox()" class="text-white/80 p-2 bg-white/10 rounded-full">
                <i data-lucide="x" class="w-6 h-6 sm:w-8 h-8"></i>
            </button>
        </div>

        <div class="flex-1 relative flex items-center justify-center px-2">
            <button onclick="changeImage(-1)" class="absolute left-0 h-full w-16 flex items-center justify-center text-white/20 active:text-orange-400 transition-all z-[110]">
                <i data-lucide="chevron-left" class="w-10 h-10"></i>
            </button>
            
            <img id="lightbox-img" src="" class="max-h-[65vh] max-w-full rounded shadow-2xl object-contain" alt="Gallery View">
            
            <button onclick="changeImage(1)" class="absolute right-0 h-full w-16 flex items-center justify-center text-white/20 active:text-orange-400 transition-all z-[110]">
                <i data-lucide="chevron-right" class="w-10 h-10"></i>
            </button>
        </div>

        <div class="w-full p-6 pb-10 flex flex-col items-center gap-4">
            <a id="download-btn" href="" download class="w-full max-w-xs flex items-center justify-center gap-3 bg-orange-500 text-white py-4 rounded-xl font-bold shadow-xl active:scale-95 transition-transform">
                <i data-lucide="download" class="w-5 h-5"></i>
                SAVE IMAGE
            </a>
        </div>
    </div>

    <script>
        const config = {
            folderPath: 'images/AS2024/',
            baseName: 'image',
            defaultExtension: '.png',
            exceptions: {}, // Map exceptions here if needed (e.g. 2: '.jpg')
            totalImages: 8
        };

        const galleryImages = [];
        const wrapper = document.getElementById('dynamic-gallery-wrapper');

        function renderGallery() {
            for (let i = 1; i <= config.totalImages; i++) {
                const fileExt = config.exceptions[i] || config.defaultExtension;
                const imgPath = `${config.folderPath}${config.baseName}${i}${fileExt}`;
                galleryImages.push(imgPath);

                const col = document.createElement('div');
                col.className = "group relative aspect-square glass-card rounded-2xl overflow-hidden shadow-sm active:opacity-80 transition-all cursor-pointer";
                
                col.innerHTML = `
                    <img src="${imgPath}" 
                        alt="Image ${i}" 
                        class="w-full h-full object-cover transition-transform duration-700" 
                        loading="lazy">
                `;
                
                col.onclick = () => openLightbox(i - 1);
                wrapper.appendChild(col);
            }
        }

        let currentIndex = 0;
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const downloadBtn = document.getElementById('download-btn');
        const counter = document.getElementById('img-counter');

        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            lightbox.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function updateLightbox() {
            lightboxImg.style.opacity = '0';
            lightboxImg.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                const src = galleryImages[currentIndex];
                lightboxImg.src = src;
                downloadBtn.href = src;
                if(counter) {
                    counter.innerText = `${(currentIndex + 1).toString().padStart(2, '0')} / ${galleryImages.length.toString().padStart(2, '0')}`;
                }
                lightboxImg.style.opacity = '1';
                lightboxImg.style.transform = 'scale(1)';
            }, 100);
        }

        function changeImage(dir) {
            currentIndex = (currentIndex + dir + galleryImages.length) % galleryImages.length;
            updateLightbox();
        }

        renderGallery();
        lucide.createIcons();

        // Close lightbox on clicking background
        lightbox.onclick = (e) => {
            if (e.target === lightbox) closeLightbox();
        };
    </script>
</body>
</html>
