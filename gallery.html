<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAVAS Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .modal-bg { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); }
        .img-hidden { opacity: 0; transform: scale(0.95); }
        #lightbox-img { transition: all 0.3s ease-in-out; }
    </style>
</head>

<body class="min-h-screen bg-slate-50 font-sans text-gray-800 relative selection:bg-orange-200">

    <div class="fixed top-[-5%] left-[-5%] w-[30rem] h-[30rem] bg-orange-200/40 rounded-full mix-blend-multiply filter blur-[100px] z-0"></div>
    <div class="fixed bottom-[-5%] right-[-5%] w-[35rem] h-[35rem] bg-rose-200/40 rounded-full mix-blend-multiply filter blur-[100px] z-0"></div>

    <div class="relative z-10 flex flex-col min-h-screen">
        
        <header class="p-6 sm:p-10 max-w-7xl mx-auto w-full">
            <a href="index.html" class="flex items-center gap-2 text-orange-600 font-bold hover:text-rose-600 transition-colors mb-6">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                <span>Back to Home</span>
            </a>
            <h1 class="text-3xl sm:text-5xl font-extrabold text-gray-900 tracking-tight">
                Event <span class="bg-clip-text text-transparent bg-gradient-to-r from-orange-600 to-rose-600">Gallery</span>
            </h1>
        </header>

        <main class="flex-1 max-w-7xl mx-auto w-full px-6 pb-20">
            <div id="dynamic-gallery-wrapper" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">
            </div>
        </main>

        <footer class="bg-white/40 backdrop-blur-md py-8 text-center text-sm text-gray-500 border-t border-white/20">
            <p>© 2026 JAVAS Karimnagar.</p>
        </footer>
    </div>

    <div id="lightbox" class="fixed inset-0 z-[100] hidden flex flex-col modal-bg">
        <div class="w-full flex justify-end p-6 z-[110]">
            <button onclick="closeLightbox()" class="text-white/60 hover:text-white transition-colors p-3 bg-white/10 rounded-full backdrop-blur-md">
                <i data-lucide="x" class="w-8 h-8"></i>
            </button>
        </div>
        <div class="flex-1 relative flex items-center justify-center px-4">
            <button onclick="changeImage(-1)" class="absolute left-2 md:left-8 text-white/30 hover:text-orange-400 transition-all p-3 z-[110]">
                <i data-lucide="chevron-left" class="w-10 h-10 md:w-16 md:h-16"></i>
            </button>
            <img id="lightbox-img" src="" class="max-h-[70vh] max-w-full rounded-lg shadow-2xl object-contain" alt="Gallery View">
            <button onclick="changeImage(1)" class="absolute right-2 md:right-8 text-white/30 hover:text-orange-400 transition-all p-3 z-[110]">
                <i data-lucide="chevron-right" class="w-10 h-10 md:w-16 md:h-16"></i>
            </button>
        </div>
        <div class="w-full p-8 pb-12 flex flex-col items-center gap-4 bg-gradient-to-t from-black via-black/60 to-transparent">
            <a id="download-btn" href="" download class="flex items-center gap-3 bg-orange-500 text-white px-12 py-4 rounded-full font-bold shadow-2xl hover:bg-white hover:text-orange-600 transition-all duration-300 transform active:scale-95">
                <i data-lucide="download" class="w-5 h-5"></i>
                DOWNLOAD IMAGE
            </a>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const config = {
            folderPath: 'images/AS2024/',
            baseName: 'img',
            defaultExtension: '.png', // Most images are this
            // Exceptions Map: index (image number) : extension
            exceptions: {
                2: '.png',  // img2 is actually a jpg
                5: '.png', // img5 is a jpeg
                8: '.png'  // img8 is a webp
            },
            totalImages: 8
        };

        const galleryImages = [];
        const wrapper = document.getElementById('dynamic-gallery-wrapper');

        // --- RENDER GALLERY ---
        function renderGallery() {
            for (let i = 1; i <= config.totalImages; i++) {
                // Determine extension: Check exceptions first, else use default
                const fileExt = config.exceptions[i] || config.defaultExtension;
                
                const imgPath = `${config.folderPath}${config.baseName}${i}${fileExt}`;
                galleryImages.push(imgPath);

                const col = document.createElement('div');
                col.className = "group relative aspect-square glass-card rounded-[2rem] overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500 cursor-pointer";
                
                // Using object-cover ensures that even if images are different sizes, 
                // they fit perfectly in the square grid
                col.innerHTML = `
                    <img src="${imgPath}" 
                        alt="Image ${i}" 
                        class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" 
                        loading="lazy">
                `;
                
                col.onclick = () => openLightbox(i - 1);
                wrapper.appendChild(col);
            }
        }

        // --- LIGHTBOX LOGIC ---
        let currentIndex = 0;
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const downloadBtn = document.getElementById('download-btn');
        const counter = document.getElementById('img-counter');

        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            lightbox.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function updateLightbox() {
            lightboxImg.classList.add('img-hidden');
            setTimeout(() => {
                const src = galleryImages[currentIndex];
                lightboxImg.src = src;
                downloadBtn.href = src;
                counter.innerText = `${(currentIndex + 1).toString().padStart(2, '0')} / ${galleryImages.length.toString().padStart(2, '0')}`;
                lightboxImg.classList.remove('img-hidden');
            }, 150);
        }

        function changeImage(dir) {
            currentIndex = (currentIndex + dir + galleryImages.length) % galleryImages.length;
            updateLightbox();
        }

        // Initialize
        renderGallery();
        lucide.createIcons();

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (lightbox.classList.contains('hidden')) return;
            if (e.key === "ArrowRight") changeImage(1);
            if (e.key === "ArrowLeft") changeImage(-1);
            if (e.key === "Escape") closeLightbox();
        });
    </script>
</body>
</html>
